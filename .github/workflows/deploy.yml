# Deploy default.xml to microkit-manifest after successful runs.

name: Deploy

on:
  push:
    # TEMP: remove
    branches: [main, julia/ci]
    paths-ignore:
      - '**.md'

  # allow manual trigger
  workflow_dispatch:

  # allow explicit trigger from other repos when dependencies have changed
  repository_dispatch:
    types: [deps-update]

jobs:
  code:
    name: Freeze Code
    runs-on: ubuntu-latest
    outputs:
      xml: ${{ steps.repo.outputs.xml }}
    steps:
    - id: repo
      uses: au-ts/seL4-ci-actions/repo-checkout@julia/microkit
      with:
        manifest_repo: au-ts/microkit-manifest
        manifest_branch: main
        manifest: main.xml

  sim:
    name: Simulation
    needs: code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        march: [aarch64, x86_64, riscv64]
        compiler: [gcc]
    steps:
    - uses: au-ts/seL4-ci-actions/microkit-sim@julia/microkit
      with:
        xml: ${{ needs.code.outputs.xml }}
        march: ${{ matrix.march }}
        compiler: ${{ matrix.compiler }}

  hw-build:
    name: HW Build
    needs: code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        march: [aarch64, x86_64, riscv64]
        compiler: [gcc]
    steps:
    - name: Build
      uses: au-ts/seL4-ci-actions/microkit-hw@julia/microkit
      with:
        xml: ${{ needs.code.outputs.xml }}
        march: ${{ matrix.march }}
        compiler: ${{ matrix.compiler }}
    - name: Upload images
      uses: actions/upload-artifact@v4
      with:
        name: images-${{ matrix.march }}-${{ matrix.compiler }}
        path: '*-images.tar.gz'

  the_matrix:
    name: Matrix
    needs: hw-build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
    - id: matrix
      uses: au-ts/seL4-ci-actions/microkit-hw-matrix@julia/microkit

  hw-run:
    name: HW Run
    if: ${{ github.repository_owner == 'au-ts' }}
    runs-on: ubuntu-latest
    needs: [sim, the_matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.the_matrix.outputs.matrix) }}
    # do not run concurrently with other workflows, but do run concurrently in the build matrix
    concurrency: hw-run-${{ strategy.job-index }}
    steps:
      - name: Get machine queue
        uses: actions/checkout@v4
        with:
          repository: seL4/machine_queue
          path: machine_queue
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: images-${{ matrix.march }}-${{ matrix.compiler }}
      - name: Run
        uses: au-ts/seL4-ci-actions/microkit-hw-run@julia/microkit
        with:
          platform: ${{ matrix.platform }}
          compiler: ${{ matrix.compiler }}
          mode: ${{ matrix.mode }}
          index: $${{ strategy.job-index }}
        env:
          HW_SSH: ${{ secrets.HW_SSH }}

  deploy:
    name: Deploy manifest
    if: ${{ github.repository_owner == 'au-ts' }}
    runs-on: ubuntu-22.04
    needs: [code, hw-run]
    steps:
    - name: Deploy
      uses: au-ts/seL4-ci-actions/manifest-deploy@julia/microkit
      with:
        xml: ${{ needs.code.outputs.xml }}
        manifest_repo: au-ts/microkit-manifest
        manifest_branch: main
      env:
        GH_SSH: ${{ secrets.CI_SSH }}
